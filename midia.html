<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola ou Trabalho</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #0056b3;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #003d80;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        main {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        section {
            margin-bottom: 40px;
        }

        h2 {
            color: #0056b3;
            margin-bottom: 15px;
        }

        /* Galeria */
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        figure {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        figure img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        figure img:hover {
            transform: scale(1.03);
        }

        figcaption {
            padding: 10px;
            font-size: 0.9rem;
        }

        /* Vídeo e áudio */
        .midia-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        iframe,
        audio {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background-color: #003d80;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Escola ou Trabalho</h1>
        <p>Impactos, desafios e soluções para garantir o acesso à educação.</p>
    </header>

    <nav>
        <a href="index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="dados.html">Dados</a>
        <a href="midia.html">Mídia</a>
    </nav>

    <main>

        <!-- GALERIA -->
        <section>
            <h2>Galeria de Imagens</h2>

            <div class="galeria">

                <figure>
                    <img src="imagens e videos e audios/escola moderna.jpeg"
                        alt="Alunos estudando em sala de aula moderna">
                        <p>Fonte:Dom Bosco</p>
                    <figcaption>
                        Alunos estudando em sala de aula moderna
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens e videos e audios/professora ensinando.jpeg"
                        alt="Professora auxiliando alunos durante atividade">
                        <p>Fonte:Colegio Raizes</p>
                    <figcaption>
                        Professora auxiliando alunos durante atividade
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens e videos e audios/Criança realizando atividades.jpeg"
                        alt="Criança realizando atividades escolares">
                        <p>Fonte:Educacional</p>
                    <figcaption>
                        Criança realizando atividades escolares
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens e videos e audios/Biblioteca escolar incentivando.jpeg"
                        alt="Biblioteca escolar incentivando a leitura">
                        <p>Fonte:Edusoft</p>
                    <figcaption>
                        Biblioteca escolar incentivando a leitura
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens e videos e audios/Alunos utilizando computadores.jpeg"
                        alt="Alunos utilizando computadores na escola">
                    <p>Fonte:Hypescience</p>
                    <figcaption>
                    Alunos utilizando computadores
                    </figcaption>
                </figure>

                <figure>
                    <img src="imagens e videos e audios/Jovem refletindo sobre abandono escola.jpeg"
                        alt="Jovem refletindo sobre abandono escolar">
                    <p>Fonte:Santillanaeducacao</p>
                    <figcaption>
                     Jovem refletindo sobre abandono escolar
                    </figcaption>
                </figure>

            </div>
        </section>

        
        <section>
            <h2>Vídeo Educativo</h2>

            <div class="midia-box">
                <iframe
                    width="560"
                    height="315"
                    src="imagens e videos e audios/audio reportagem.mp4"
                    title="Vídeo sobre educação de qualidade e combate à evasão escolar"
                    frameborder="0"
                    allowfullscreen>
                </iframe>

                <p>
                   Fonte:Casé Fortes - TCPBrasil
                </p>
            </div>
        </section>

     
        <section>
            <h2>Áudio / Podcast</h2>

            <div class="midia-box">

                <audio controls>
                    <source src="imagens e videos e audios/audio reportagem.mp4" type="audio/mpeg">

                    
                </audio>

                <p>
                
                </p>

            </div>
        </section>

    </main>

    <footer>
        <p>
            
        </p>
    </footer>

</body>
</html>
